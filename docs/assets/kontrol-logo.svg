<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-labelledby="title desc">
  <title id="title">Kontrol logo</title>
  <desc id="desc">A control-plane mark showing a central K routed to web UI, CLI agent, policy, and review nodes.</desc>
  <defs>
    <linearGradient id="panel" x1="34" y1="24" x2="246" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="accent" x1="70" y1="68" x2="214" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect x="18" y="18" width="244" height="244" rx="42" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="34" y="34" width="212" height="212" rx="32" fill="none" stroke="#334155" stroke-width="2"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M140 140 L78 82" stroke="#2dd4bf" stroke-width="8"/>
    <path d="M140 140 L206 78" stroke="#60a5fa" stroke-width="8"/>
    <path d="M140 140 L206 202" stroke="#f59e0b" stroke-width="8"/>
    <path d="M140 140 L78 202" stroke="#a78bfa" stroke-width="8"/>
  </g>
  <g>
    <circle cx="78" cy="82" r="18" fill="#0f172a" stroke="#2dd4bf" stroke-width="6"/>
    <circle cx="206" cy="78" r="18" fill="#0f172a" stroke="#60a5fa" stroke-width="6"/>
    <circle cx="206" cy="202" r="18" fill="#0f172a" stroke="#f59e0b" stroke-width="6"/>
    <circle cx="78" cy="202" r="18" fill="#0f172a" stroke="#a78bfa" stroke-width="6"/>
  </g>
  <circle cx="140" cy="140" r="56" fill="#0b1220" stroke="url(#accent)" stroke-width="8"/>
  <path d="M118 104 V176 M118 140 L164 104 M135 142 L168 176" fill="none" stroke="#f8fafc" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
